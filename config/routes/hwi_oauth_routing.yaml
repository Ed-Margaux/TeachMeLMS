hwi_oauth_redirect:
    resource: "@HWIOAuthBundle/Resources/config/routing/redirect.php"
    prefix:   /connect

hwi_oauth_connect:
    resource: "@HWIOAuthBundle/Resources/config/routing/connect.php"
    prefix:   /connect

# Do not mount login.php at /login/ — it replaces the real sign-in page (app_login at /login).
# Google sign-in uses hwi_oauth_service_redirect → /connect/google

# Callback URL registered in Google Cloud Console (handled by the oauth firewall authenticator)
hwi_oauth_google_check:
    path: /connect/google/check
    methods: [GET]
