security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: auto
    role_hierarchy:
        ROLE_ADMIN: [ROLE_STAFF]
        ROLE_STAFF: [ROLE_USER]
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        # Public JSON endpoints (must be before `api` — same /api prefix)
        api_public:
            pattern: ^/api/(login|login/google|register|verify-email|health)$
            stateless: true 
            security: false
        # All other /api routes: valid JWT required (Bearer), or 401
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            entry_point: form_login
            oauth:
                resource_owners:
                    google: "/connect/google/check"
                login_path: /login
                use_forward: false
                failure_path: /login
                oauth_user_provider:
                    service: my_google_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\AuthenticationSuccessHandler
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: false

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/login/google$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email$, roles: PUBLIC_ACCESS }
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }
        # CORS preflight must not require Authorization (mobile / SPA)
        - { path: ^/api, roles: PUBLIC_ACCESS, methods: [OPTIONS] }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin/logs, roles: ROLE_ADMIN }
        - { path: ^/admin/dashboard, roles: ROLE_STAFF }
        - { path: ^/admin, roles: ROLE_STAFF }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/students, roles: ROLE_STAFF }
        - { path: ^/lessons, roles: ROLE_STAFF }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
