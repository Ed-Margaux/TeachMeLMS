# Railway config — ensures Composer deps exist before the app starts.
# https://docs.railway.com/guides/symfony

[build]
# Force prod during install so post-install scripts do not assume dev.
buildCommand = "APP_ENV=prod APP_DEBUG=0 composer install --no-dev --optimize-autoloader --no-interaction && APP_ENV=prod APP_DEBUG=0 php bin/console asset-map:compile"

[deploy]
# Force prod at runtime (.env defaults to APP_ENV=dev if Railway vars are missing).
startCommand = "APP_ENV=prod APP_DEBUG=0 php -S 0.0.0.0:$PORT -t public public/index.php"
releaseCommand = "APP_ENV=prod APP_DEBUG=0 php bin/console doctrine:migrations:migrate --no-interaction"
